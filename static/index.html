<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kara Live Chat</title>
    <link rel="icon" href="/color.png" type="image/png">
    <!-- Microsoft Teams JS SDK -->
    <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fff; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #header { background: #000; color: white; padding: 14px 20px; text-align: center; font-weight: 600; font-size: 16px; letter-spacing: 0.3px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 4px; background: #fff; }

        /* Row wrapper: positions avatar + bubble side by side */
        .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 12px; }
        .msg-row.user-row { flex-direction: row-reverse; }  /* user rows: bubble on right */
        .msg-row.ai-row   { flex-direction: row; }           /* ai rows: bubble on left  */

        /* Avatar circles */
        .avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
        .avatar-ai   { background: #000; color: #fff; }
        .avatar-user { background: #10a37f; color: #fff; }

        /* Bubbles */
        .bubble { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        /* User bubble — right side, dark background like ChatGPT */
        .user { background: #f0f0f0; color: #0d0d0d; border-bottom-right-radius: 4px; align-self: flex-end; }
        /* AI bubble — left side, white with subtle border */
        .ai   { background: #fff; color: #0d0d0d; border: 1px solid #e5e5e5; border-bottom-left-radius: 4px; align-self: flex-start; }

        /* Controls bar */
        .controls { background: #fff; padding: 16px 20px 20px; text-align: center; border-top: 1px solid #e5e5e5; }
        .status { font-size: 12px; color: #888; margin-top: 6px; }
        .circle-btn { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .circle-btn:hover { transform: scale(1.07); }
        .btn-start { background: #10a37f; color: white; }
        .btn-stop  { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); } 70% { box-shadow: 0 0 0 14px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="header">Kara Live Chat</div>

<div id="chat-window">
    <div class="msg-row ai-row">
        <div class="avatar avatar-ai">K</div>
        <div class="bubble ai initial-greeting">Hello! Get started by clicking the 🎙️ button below and talk to Kara.</div>
    </div>
</div>

<div class="controls">
    <button id="toggleBtn" class="circle-btn btn-start">🎙️</button>
    <div id="status" class="status">Disconnected</div>
</div>

<script>
    // const agentIdInput = document.getElementById("agentId"); // Removed
    const toggleBtn = document.getElementById("toggleBtn");
    const status = document.getElementById("status");
    const chatWindow = document.getElementById("chat-window");

    let isConnected = false;
    let ws = null;
    let audioCtx = null;
    let mediaStream = null;
    let workletNode = null;
    let nextStartTime = 0;
    let currentInteractionId = null; // Track conversation turns
    let pendingAiBuffer = null; // Buffers AI chunks until user transcript arrives (to maintain correct display order)
    let isGreetingMode = true; // True only for the very first AI message. False after first user message or first full AI response.
    let scriptProcessor = null; // Reference to processor to disconnect it explicitly
    let mediaSource = null;    // Reference to source to disconnect it explicitly

    // --- Config ---
    const MUTE_INITIAL_GREETING = false; // Set to true to suppress AI's "Hello! How can I help?"
    let hasReceivedFirstResponse = false; // Flag to track interaction
    let activeAudioSources = 0; // Track how many audio chunks are currently playing

    // --- Teams Integration ---
    let teamsContext = null;

    if (window.microsoftTeams) {
        console.log("Initializing Microsoft Teams SDK...");
        microsoftTeams.app.initialize().then(() => {
            console.log("Teams SDK Initialized");
            microsoftTeams.app.getContext().then((context) => {
                teamsContext = context;
                console.log("Teams Context:", context);
                
                // Update UI with User Name
                const userName = context.user?.displayName || "Teams User";
                const header = document.getElementById('header');
                if (header) {
                    header.textContent = `Kara Live Chat - Hello, ${userName}`;
                }

                // Optional: You could send this context to the backend using a hidden message or API call
                // if the backend supports handling user metadata.
            }).catch(err => {
                console.error("Error getting Teams context:", err);
            });
        }).catch(err => {
            console.error("Error initializing Teams SDK:", err);
        });
    }

    // --- Audio Utils (Base64) ---
    function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, input[i]));
            output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
    }

    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }


    // --- UI Helpers ---

    function typewriteText(element, text) {
        // Initialize queue if needed
        if (!element._typeQueue) {
            element._typeQueue = [];
            element._isTyping = false;
        }

        // Push characters to queue
        for (let char of text) {
            element._typeQueue.push(char);
        }

        // Start processing if not active
        if (!element._isTyping) {
            processQueue(element);
        }
    }

    function processQueue(element) {
        if (element._typeQueue.length > 0) {
            element._isTyping = true;
            const char = element._typeQueue.shift();

            // Append and scroll
            element.textContent += char;

            // Only scroll if near bottom to prevent jitter
            if (chatWindow.scrollHeight - chatWindow.scrollTop - chatWindow.clientHeight < 100) {
               chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            // Adaptive Speed: If queue is huge, type faster
            let delay = 30; // Base speed
            if (element._typeQueue.length > 50) delay = 10;
            if (element._typeQueue.length > 100) delay = 5;

            setTimeout(() => processQueue(element), delay);
        } else {
            element._isTyping = false;
        }
    }

    function addBubble(text, cls, forceNew = false, interactionId = null) {
        if (!text) return;

        // Get the last BUBBLE element (not the row wrapper)
        const lastRow = chatWindow.lastElementChild;
        const lastBubble = lastRow ? lastRow.querySelector('.bubble') : null;
        let isSameSender = lastBubble && lastBubble.classList.contains(cls);

        // --- INTERACTION ID LOCKING ---
        if (interactionId && lastBubble && lastBubble.dataset.interactionId === interactionId) {
            isSameSender = true;
            forceNew = false;
        }

        // --- DYNAMIC GREETING SEPARATION ---
        const prevText = lastBubble && (lastBubble._fullText || lastBubble.textContent || "");
        if (lastBubble && cls === 'ai' && prevText.includes("How can I help you today")) {
             isSameSender = false;
        }

        if (forceNew) {
            isSameSender = false;
        }

        // --- CONTENT-BASED DEDUPLICATION & MERGING ---
        if (lastBubble && lastBubble.classList.contains(cls)) {
             const cleanText = text.trim();
             const cleanLast = (lastBubble._fullText || lastBubble.textContent).trim();

             if (cleanText === cleanLast) {
                 return;
             }
             if (cleanLast.startsWith(cleanText)) {
                 return;
             }
             if (cleanText.startsWith(cleanLast)) {
                 isSameSender = true;
             }
        }

        // Append to existing bubble
        if (isSameSender) {
            if (typeof lastBubble._fullText === 'undefined') {
                lastBubble._fullText = lastBubble.textContent;
            }
            if (interactionId && !lastBubble.dataset.interactionId) {
                lastBubble.dataset.interactionId = interactionId;
            }
            if (lastBubble._fullText.trim() === text.trim()) return;

            if (text.trim().startsWith(lastBubble._fullText.trim())) {
                if (text.length > lastBubble._fullText.length) {
                    const delta = text.slice(lastBubble._fullText.length);
                    lastBubble._fullText += delta;
                    typewriteText(lastBubble, delta);
                }
                return;
            }

            let chunkToAdd = text;
            if (cls === 'user') {
                 if (!lastBubble._fullText.endsWith(' ') && !text.startsWith(' ')) {
                     chunkToAdd = ' ' + text;
                 }
            }
            lastBubble._fullText += chunkToAdd;
            typewriteText(lastBubble, chunkToAdd);
            return;
        }

        // Create new row with avatar + bubble
        const row = document.createElement("div");
        row.className = `msg-row ${cls === 'ai' ? 'ai-row' : 'user-row'}`;

        const avatar = document.createElement("div");
        avatar.className = `avatar ${cls === 'ai' ? 'avatar-ai' : 'avatar-user'}`;
        avatar.textContent = cls === 'ai' ? 'K' : 'U';

        const div = document.createElement("div");
        div.className = `bubble ${cls}`;
        div._fullText = text;
        if (interactionId) div.dataset.interactionId = interactionId;
        div.textContent = "";

        // AI: avatar on left, bubble on right of avatar
        // User: avatar on right (flex-direction: row-reverse handles it)
        row.appendChild(avatar);
        row.appendChild(div);

        chatWindow.appendChild(row);

        requestAnimationFrame(() => {
            chatWindow.scrollTop = chatWindow.scrollHeight;
            typewriteText(div, text);
        });
    }

    // --- Main Logic ---

    toggleBtn.onclick = async () => {
        if (!isConnected) {
            await startConversation();
        } else {
            await stopConversation();
        }
    };

    async function startConversation() {
        // No client-side agent ID input needed (managed by backend)

        toggleBtn.disabled = true;
        status.textContent = "Connecting...";

        try {
            // 1. Get Microphone
            status.textContent = "Requesting Mic...";
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true, // PREVENT ECHO
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            // 2. Get Signed URL (Secure Auth)
            // We call our backend to generate a signed URL using the configured API Key and Agent ID
            status.textContent = "Authenticating...";
            const authResp = await fetch(`/api/get-signed-url`); // Backend uses environment variable for Agent ID
            if (!authResp.ok) {
                const errorText = await authResp.text();
                throw new Error("Backend Auth Failed: " + errorText);
            }

            const authData = await authResp.json();
            if (!authData.signed_url) throw new Error("No signed URL from ElevenLabs. Check API Key/Agent ID.");

            const wsUrl = authData.signed_url;

            // 3. Connect WebSocket
            status.textContent = "Connecting WS...";
            ws = new WebSocket(wsUrl);

            ws.onopen = async () => {
                isConnected = true;
                isGreetingMode = true; // Reset greeting flag on new connection
                toggleBtn.className = "circle-btn btn-stop";
                toggleBtn.textContent = "🛑";
                toggleBtn.disabled = false;
                status.textContent = "Listening... (VAD Enabled)";

                // Remove the static placeholder greeting — ElevenLabs will send its own
                const staticGreeting = chatWindow.querySelector('.initial-greeting');
                if (staticGreeting) {
                    const row = staticGreeting.closest('.msg-row');
                    if (row) row.remove();
                }

                // --- TEAMS INTEGRATION: Send User Context to AI ---
                if (teamsContext && teamsContext.user && teamsContext.user.displayName) {
                    const userName = teamsContext.user.displayName;
                    console.log("Sending Teams user context to AI:", userName);
                    
                    // We send a text message to the AI to introduce the user.
                    // This acts as a "System Prompt" via the user channel.
                    const introMessage = {
                        text: `Hi, my name is ${userName}.`,
                        try_trigger_generation: true // Force the AI to acknowledge/reply to this
                    };
                    ws.send(JSON.stringify(introMessage));
                    
                    // Optional: Visually show this in the chat or keep it hidden. 
                    // Keeping it hidden makes the AI's "Hello [Name]" seem improved.
                }

                // Initialize Audio Context for playing and recording
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                nextStartTime = audioCtx.currentTime;

                // Start Streaming Audio
                await startAudioStreaming();
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);

                // Handle Audio Output (TTS)
                if (msg.audio_event) {
                    if (MUTE_INITIAL_GREETING && !hasReceivedFirstResponse) {
                        // Skip audio for first greeting if flag set
                    } else {
                        playAudioChunk(msg.audio_event.audio_base_64);
                    }
                }


                // Handle Transcripts (User)
                // If user speaks, the Greeting Phase is definitely over.
                // We show user text, then flush any buffered AI info that might be the answer.
                if (msg.user_transcription_event) {
                    const text = msg.user_transcription_event.user_transcript || msg.user_transcription_event.user_transcription;
                    if (text) {
                        isGreetingMode = false;
                        // 1. Show user bubble FIRST
                        addBubble(text, "user", true);
                        hasReceivedFirstResponse = true; // (Legacy flag, kept for audio logic)

                        // 2. Flush buffered AI response BELOW the user bubble
                        if (pendingAiBuffer && pendingAiBuffer.chunks.length > 0) {
                            const combined = pendingAiBuffer.chunks.join('');
                            const bufferedId = pendingAiBuffer.interactionId;
                            pendingAiBuffer = null;
                            addBubble(combined, "ai", true, bufferedId);
                        } else {
                            pendingAiBuffer = null;
                        }
                        currentInteractionId = null;
                    }
                }

                // Handle Agent Response (Text chunks)
                // agent_response_event = full text. We use this to mark the END of a turn.
                // If the greeting finishes, subsequent turns must be buffered.
                if (msg.agent_response_event) {
                    // Turn is complete. If it was the greeting, now it's done.
                    if (isGreetingMode) {
                         isGreetingMode = false;
                    }
                }

                if (msg.text_response_part) {
                    const response = msg.text_response_part.text;
                    if (!response) return;

                    const eventInteractionId = msg.text_response_part.interaction_id || '__initial__';
                    const isNewTurn = eventInteractionId && eventInteractionId !== currentInteractionId;
                    if (isNewTurn) currentInteractionId = eventInteractionId;

                    if (isGreetingMode) {
                        // We are in the initial greeting phase — render immediately
                        addBubble(response, "ai", isNewTurn, eventInteractionId);
                    } else {
                        // Not greeting anymore — ANY text must wait for the user transcript bubble first
                        if (!pendingAiBuffer) {
                            pendingAiBuffer = { chunks: [], interactionId: eventInteractionId };
                        }
                        pendingAiBuffer.chunks.push(response);
                    }
                }
            };

            ws.onerror = (e) => {
                status.textContent = "Error connecting";
                addBubble("Connection error. Check Agent ID.", "ai", true); // Force new bubble
                alert("WebSocket Error. If using a Voice ID, you must Use an AGENT ID from 'Conversational AI' settings.");
                stopConversation();
            };

            ws.onclose = () => {
                if (isConnected) {
                    addBubble("Connection closed.", "ai", true); // Force new bubble
                    stopConversation();
                }
            };

        } catch (err) {
            status.textContent = "Error";
            addBubble("Error: " + err.message, "ai", true); // Force new bubble
            alert("Error: " + err.message);
            stopConversation();
        }
    }

    async function startAudioStreaming() {
        if (!audioCtx || !mediaStream || !ws) return;

        // Create a ScriptProcessor to get raw PCM data (Simple approach)
        const source = audioCtx.createMediaStreamSource(mediaStream);
        const processor = audioCtx.createScriptProcessor(4096, 1, 1);

        // Use a GainNode to mute local feedback while still processing events
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0; // Mute input -> output feedback loop

        source.connect(processor);
        processor.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        processor.onaudioprocess = (e) => {
            if (!isConnected || ws.readyState !== WebSocket.OPEN) return;

            // STRICT TURN-TAKING: Only send mic audio if the AI is NOT speaking.
            // This prevents echo loops and saves credits by avoiding unnecessary "barge-in".
            // If activeAudioSources > 0, we drop the mic input.
            if (activeAudioSources > 0) return;

            const inputData = e.inputBuffer.getChannelData(0); // Float32
            // Convert to Int16 PCM
            const buffer = new ArrayBuffer(inputData.length * 2);
            const view = new DataView(buffer);
            floatTo16BitPCM(view, 0, inputData);

            // Send base64
            const base64Audio = arrayBufferToBase64(buffer);
            ws.send(JSON.stringify({
                "user_audio_chunk": base64Audio
            }));
        };

        workletNode = processor;
    }

    function playAudioChunk(base64) {
        if (!audioCtx) return;

        // Decode base64 to array buffer
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }

        // Decode audio data (PCM or MP3 depending on what ElevenLabs sends)
        // Usually, convai sends PCM 16k mono raw, but sometimes mp3.
        // Assuming PCM 16k 1ch from WebSocket if configured, BUT default is often raw PCM or encoded.
        // If it's headerless PCM, decodeAudioData might fail.
        // Let's assume it's mp3 or wav if generic, but for realtime it's often raw PCM.
        // ElevenLabs ConvAI defaults to: output_format=pcm_16000

        // Manual PCM decoding (safest for raw PCM 16kHz)
        // Since we don't know if it includes header.
        // Try native decode first (if it has header)

        // Actually, let's treat it as Raw PCM 16bit 16kHz for low latency
        // because that's the standard for this API.

        // Convert Int16 bytes to Float32
        const int16 = new Int16Array(bytes.buffer);
        const float32 = new Float32Array(int16.length);
        for(let i=0; i<int16.length; i++) {
            float32[i] = int16[i] / 32768.0;
        }

        const buffer = audioCtx.createBuffer(1, float32.length, 16000);
        buffer.getChannelData(0).set(float32);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);

        // Schedule playback
        const now = audioCtx.currentTime;
        // If nextStartTime is in the past, reset it to now (catch up)
        if (nextStartTime < now) nextStartTime = now;

        source.start(nextStartTime);
        activeAudioSources++; // New audio source playing (AI speaking)
        source.onended = () => {
            activeAudioSources = Math.max(0, activeAudioSources - 1);
        };
        nextStartTime += buffer.duration;
    }

    async function stopConversation() {
        isConnected = false;
        status.textContent = "Disconnected";
        toggleBtn.className = "circle-btn btn-start";
        toggleBtn.textContent = "🎙️";
        toggleBtn.disabled = false;

        if (ws) ws.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (workletNode) workletNode.disconnect();
        if (audioCtx) audioCtx.close();

        ws = null;
        audioCtx = null;
        mediaStream = null;
    }

</script>
</body>
</html>
